<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>รวมข่าวรายวัน CM108</title>
    
    <!-- Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- เพิ่มฟอนต์ Prompt เข้ามาเพื่อใช้งานใน Canvas Editor ตามคำสั่ง -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&family=Prompt:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Noto Sans Thai', sans-serif; 
            background-color: #f3f4f6; 
            -webkit-font-smoothing: antialiased;
        }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Custom Scrollbar for better look */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        select { -webkit-appearance: none; appearance: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        const { useState, useEffect, useRef } = React;

        // --- Firebase Modules ---
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCTDyqdyIzXnH6GUSZ-c2oj4uf9YRvVzho",
            authDomain: "newsupdate-618af.firebaseapp.com",
            projectId: "newsupdate-618af",
            storageBucket: "newsupdate-618af.firebasestorage.app",
            messagingSenderId: "904029958760",
            appId: "1:904029958760:web:8b36e4723e89b9f50741dd",
            measurementId: "G-8M70Q4MVHH"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'daily-news-app';

        const THAI_MONTHS = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];

        // --- Icon Component ---
        const Icon = ({ name, size = 20, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = `<i data-lucide="${name}" style="width: ${size}px; height: ${size}px;" class="${className}"></i>`;
                    window.lucide.createIcons();
                }
            }, [name, size, className]);
            return <span ref={iconRef} className={`inline-flex items-center justify-center ${className}`} />;
        };

        // --- Helper Functions ---
        const processImage = (file, maxSizeKB = 700) => {
            return new Promise((resolve) => {
                if (file.size <= maxSizeKB * 1024) {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = () => resolve(reader.result);
                } else {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = (e) => {
                        const img = new Image();
                        img.src = e.target.result;
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            let width = img.width; let height = img.height;
                            if (width > 1200) { height = (height * 1200) / width; width = 1200; }
                            canvas.width = width; canvas.height = height;
                            
                            const ctx = canvas.getContext('2d');
                            // ปรับปรุงคุณภาพการวาดรูปลดรอยหยัก
                            ctx.imageSmoothingEnabled = true;
                            ctx.imageSmoothingQuality = 'high';
                            
                            ctx.drawImage(img, 0, 0, width, height);
                            // ปรับคุณภาพ JPEG เป็น 0.95 เพื่อแก้ปัญหารูปแตกและมีเส้นแปลกๆ
                            resolve(canvas.toDataURL('image/jpeg', 0.95));
                        };
                    };
                }
            });
        };

        const getWeekInfo = (timestamp) => {
            const d = new Date(timestamp);
            const day = d.getDay() === 0 ? 7 : d.getDay();
            const start = new Date(d); start.setDate(d.getDate() - day + 1); start.setHours(0,0,0,0);
            const end = new Date(start); end.setDate(start.getDate() + 6);
            return { 
                key: start.getTime(), 
                label: `${start.toLocaleDateString('th-TH', {day:'numeric', month:'short'})} - ${end.toLocaleDateString('th-TH', {day:'numeric', month:'short', year:'numeric'})}` 
            };
        };

        // --- Main App ---
        const App = () => {
            const [user, setUser] = useState(null);
            const [news, setNews] = useState([]);
            const [view, setView] = useState('dashboard');
            const [loading, setLoading] = useState(true);
            const [dataLoading, setDataLoading] = useState(true); 
            const [editingItem, setEditingItem] = useState(null);

            useEffect(() => {
                signInAnonymously(auth).catch(() => setUser({ uid: 'guest' }));
                const unsub = onAuthStateChanged(auth, (u) => { 
                    if(u) setUser(u); 
                    setLoading(false); 
                });
                return () => unsub();
            }, []);

            useEffect(() => {
                if (!user) return;
                const unsub = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'news'), (snap) => {
                    const data = [];
                    snap.forEach(doc => data.push({ id: doc.id, ...doc.data() }));
                    setNews(data.sort((a,b) => b.timestamp - a.timestamp));
                    setDataLoading(false); 
                    
                    const limit = Date.now() - (30 * 24 * 60 * 60 * 1000);
                    data.forEach(item => { if(item.timestamp < limit) deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'news', item.id)); });
                });
                return () => unsub();
            }, [user]);

            if (loading || dataLoading) return (
                <div className="h-screen flex flex-col items-center justify-center space-y-6">
                    <div className="relative w-20 h-20 flex items-center justify-center">
                        <div className="absolute inset-0 border-4 border-blue-100 rounded-full"></div>
                        <div className="absolute inset-0 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                        <Icon name="newspaper" className="text-blue-600 relative z-10" size={32} />
                    </div>
                    <div className="text-center">
                        <h2 className="text-xl font-bold text-gray-800 mb-1">รวมข่าวรายวัน CM108</h2>
                        <p className="text-gray-500 font-medium text-sm animate-pulse">กำลังโหลดข้อมูลข่าวสาร...</p>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen pb-24">
                    {/* Navbar */}
                    <nav className="bg-white/80 backdrop-blur-lg shadow-sm sticky top-0 z-50 px-4 md:px-8 h-16 flex items-center justify-between border-b border-gray-100">
                        <div className="flex items-center space-x-3 cursor-pointer" onClick={() => { setEditingItem(null); setView('dashboard'); }}>
                            <div className="bg-gradient-to-tr from-blue-600 to-blue-500 p-2 rounded-xl text-white shadow-md shadow-blue-200">
                                <Icon name="newspaper" size={22} />
                            </div>
                            <h1 className="text-lg font-bold text-gray-800 tracking-tight hidden sm:block">รวมข่าวรายวัน CM108</h1>
                        </div>
                        
                        {view === 'dashboard' ? (
                            <button onClick={() => setView('admin')} className="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-full font-medium shadow-md shadow-blue-200/50 flex items-center gap-2 transition-all active:scale-95 text-sm">
                                <Icon name="plus" size={18} /> <span>เพิ่มข่าวใหม่</span>
                            </button>
                        ) : (
                            <button onClick={() => { setEditingItem(null); setView('dashboard'); }} className="text-gray-500 hover:text-gray-800 font-medium flex items-center gap-1.5 transition-colors text-sm px-3 py-2 bg-gray-100 rounded-full hover:bg-gray-200">
                                <Icon name="arrow-left" size={16} /> กลับ
                            </button>
                        )}
                    </nav>

                    {/* Main Content */}
                    <main className="max-w-6xl mx-auto px-4 md:px-6 mt-8">
                        {view === 'dashboard' ? (
                            <Dashboard news={news} onEdit={(item) => { setEditingItem(item); setView('admin'); }} />
                        ) : (
                            <AdminPanel onCancel={() => { setEditingItem(null); setView('dashboard'); }} editingItem={editingItem} db={db} appId={appId} />
                        )}
                    </main>
                </div>
            );
        };

        // --- Dashboard View ---
        const Dashboard = ({ news, onEdit }) => {
            const [selWeek, setSelWeek] = useState('');
            const [selDate, setSelDate] = useState('');
            
            const weeks = new Map();
            news.forEach(n => { const info = getWeekInfo(n.timestamp); weeks.set(info.key, info.label); });
            const sortedKeys = Array.from(weeks.keys()).sort((a,b) => b - a);

            useEffect(() => { if (sortedKeys.length > 0 && !selWeek) setSelWeek(sortedKeys[0].toString()); }, [sortedKeys]);
            
            // รีเซ็ตวันที่เมื่อเปลี่ยนสัปดาห์
            useEffect(() => { setSelDate(''); }, [selWeek]);

            if (news.length === 0) return (
                <div className="text-center py-20 bg-white rounded-3xl border border-gray-100 shadow-sm mt-10">
                    <div className="bg-gray-50 w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-6 text-gray-300">
                        <Icon name="inbox" size={40} />
                    </div>
                    <h2 className="text-lg font-semibold text-gray-700">ยังไม่มีข่าวในระบบ</h2>
                    <p className="text-gray-500 mt-2 text-sm">กดปุ่มเพิ่มข่าวใหม่ด้านบน เพื่อเริ่มต้นโพสต์ข่าวสาร</p>
                </div>
            );

            const filteredByWeek = news.filter(n => getWeekInfo(n.timestamp).key.toString() === selWeek);
            const allGroups = filteredByWeek.reduce((acc, n) => { (acc[n.dateString] = acc[n.dateString] || []).push(n); return acc; }, {});
            
            const availableDates = Object.keys(allGroups);
            const displayGroups = selDate ? { [selDate]: allGroups[selDate] } : allGroups;

            return (
                <div className="space-y-10">
                    {/* Filter Section */}
                    <div className="flex flex-col md:flex-row items-center justify-between bg-white p-4 md:p-5 rounded-2xl shadow-sm border border-gray-100 gap-4">
                        <div className="flex items-center gap-2.5 font-medium text-gray-600">
                            <Icon name="calendar-days" className="text-blue-500" size={20} />
                            <span className="whitespace-nowrap">ตัวกรองข่าว:</span>
                        </div>
                        <div className="flex flex-col sm:flex-row gap-3 w-full md:w-auto flex-grow justify-end">
                            <div className="relative w-full sm:w-64">
                                <select value={selWeek} onChange={e => setSelWeek(e.target.value)} className="w-full bg-gray-50/50 p-3 pl-4 pr-10 rounded-xl font-medium text-gray-700 outline-none border border-gray-200 hover:border-blue-300 transition-colors appearance-none cursor-pointer text-sm">
                                    {sortedKeys.map((k, i) => <option key={k} value={k.toString()}>{i === 0 ? `สัปดาห์ล่าสุด (${weeks.get(k)})` : weeks.get(k)}</option>)}
                                </select>
                                <div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-gray-400">
                                    <Icon name="chevron-down" size={18} />
                                </div>
                            </div>
                            <div className="relative w-full sm:w-56">
                                <select value={selDate} onChange={e => setSelDate(e.target.value)} className="w-full bg-gray-50/50 p-3 pl-4 pr-10 rounded-xl font-medium text-gray-700 outline-none border border-gray-200 hover:border-blue-300 transition-colors appearance-none cursor-pointer text-sm">
                                    <option value="">ทุกวันในสัปดาห์</option>
                                    {availableDates.map(d => <option key={d} value={d}>{d}</option>)}
                                </select>
                                <div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-gray-400">
                                    <Icon name="calendar" size={16} />
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* News Feed */}
                    {Object.keys(displayGroups).map(date => (
                        <div key={date} className="space-y-6 fade-in">
                            <div className="flex items-center gap-4">
                                <h2 className="flex items-center gap-2.5 font-semibold text-gray-700 bg-white px-5 py-2.5 rounded-full shadow-sm border border-gray-100 text-sm">
                                    <Icon name="calendar" className="text-blue-500" size={16} /> {date}
                                </h2>
                                <div className="h-px bg-gray-200 flex-grow"></div>
                            </div>
                            
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                {displayGroups[date].map(item => <NewsCard key={item.id} item={item} onEdit={onEdit} db={db} appId={appId} />)}
                            </div>
                        </div>
                    ))}
                </div>
            );
        };

        // --- Date Editor Modal Component ---
        const DateEditorModal = ({ imageUrl, action, onClose, onComplete }) => {
            const canvasRef = useRef(null);
            const [image, setImage] = useState(null);

            const [day, setDay] = useState(() => new Date().getDate());
            const [month, setMonth] = useState(() => new Date().getMonth());
            const [year, setYear] = useState(() => new Date().getFullYear() + 543);

            const [rectY, setRectY] = useState(923); 
            const [rectHeight, setRectHeight] = useState(40);
            const [fontSize, setFontSize] = useState(31);
            
            const [showSettings, setShowSettings] = useState(false);

            useEffect(() => {
                const img = new Image();
                img.crossOrigin = "anonymous";
                img.onload = () => setImage(img);
                img.src = imageUrl;
            }, [imageUrl]);

            const drawCanvas = () => {
                if (!image || !canvasRef.current) return;
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');

                canvas.width = image.width;
                canvas.height = image.height;

                ctx.imageSmoothingEnabled = true;
                ctx.imageSmoothingQuality = 'high';

                ctx.drawImage(image, 0, 0);

                const boxWidth = image.width * 0.6; 
                const boxX = (image.width - boxWidth) / 2;
                
                ctx.fillStyle = 'black';
                ctx.fillRect(boxX, rectY - (rectHeight / 2), boxWidth, rectHeight);

                ctx.save();
                ctx.fillStyle = 'white';
                ctx.font = `600 ${fontSize}px "Prompt"`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                const dateText = `-${day} ${THAI_MONTHS[month]} ${year}-`;
                
                ctx.translate(image.width / 2, rectY);
                ctx.scale(1, 1.15); 
                ctx.fillText(dateText, 0, 0);
                ctx.restore();
            };

            useEffect(() => {
                if (image) {
                    // ใช้ document.fonts.load แทน ready เพื่อบังคับโหลดฟอนต์ตามน้ำหนักที่กำหนดก่อนวาด ป้องกันฟอนต์เพี้ยน
                    document.fonts.load(`600 ${fontSize}px "Prompt"`).then(() => {
                        const timer = setTimeout(drawCanvas, 50);
                        return () => clearTimeout(timer);
                    });
                }
            }, [image, day, month, year, rectY, rectHeight, fontSize]);

            const handleConfirm = () => {
                if (!canvasRef.current) return;
                if (action === 'download') {
                    const link = document.createElement('a');
                    link.download = `edited-news-${day}-${month + 1}-${year}.png`;
                    link.href = canvasRef.current.toDataURL('image/png');
                    link.click();
                    onComplete();
                } else if (action === 'copy') {
                    canvasRef.current.toBlob(async (blob) => {
                        try {
                            await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
                            onComplete();
                        } catch (err) {
                            alert('เบราว์เซอร์ไม่รองรับการคัดลอกรูปภาพโดยตรง กรุณาใช้ปุ่ม "ดาวน์โหลด" แทนครับ');
                        }
                    }, 'image/png');
                }
            };

            return (
                <div className="fixed inset-0 z-[100] bg-black/80 backdrop-blur-sm flex items-start md:items-center justify-center p-4 pt-12 md:p-6 animate-fade-in">
                    {/* Element ซ่อนไว้เพื่อบังคับโหลดฟอนต์ Prompt น้ำหนัก 600 */}
                    <span style={{ fontFamily: '"Prompt"', fontWeight: 600, position: 'absolute', opacity: 0, pointerEvents: 'none' }}>โหลดฟอนต์ Prompt</span>
                    
                    <div className="bg-white rounded-[2rem] w-full max-w-5xl max-h-[85vh] md:max-h-[95vh] overflow-y-auto shadow-2xl flex flex-col">
                        <div className="p-5 md:p-6 border-b border-gray-100 flex justify-between items-center sticky top-0 bg-white/95 backdrop-blur z-10">
                            <h2 className="text-xl font-bold flex items-center gap-2 text-gray-800">
                                <Icon name="calendar-edit" className="text-blue-500" />
                                แก้ไขวันที่บนปกข่าว
                            </h2>
                            <button onClick={onClose} className="p-2 bg-gray-100 hover:bg-gray-200 rounded-full text-gray-500 transition">
                                <Icon name="x" size={20} />
                            </button>
                        </div>
                        
                        <div className="p-6 grid grid-cols-1 lg:grid-cols-12 gap-8">
                            <div className="lg:col-span-5 space-y-6">
                                <div className="bg-gray-50 p-5 rounded-2xl border border-gray-200">
                                    <h3 className="text-sm font-bold text-gray-700 mb-4 flex items-center gap-2">
                                        <Icon name="calendar" size={18} className="text-blue-500" />
                                        กำหนดวันที่
                                    </h3>
                                    <div className="grid grid-cols-3 gap-2">
                                        <div>
                                            <label className="text-[10px] font-bold text-gray-400 uppercase block mb-1">วัน</label>
                                            <input 
                                                type="number" min="1" max="31" value={day} 
                                                onChange={(e) => setDay(Math.min(31, Math.max(1, parseInt(e.target.value) || 1)))}
                                                className="w-full p-2.5 bg-white border border-gray-300 rounded-xl outline-none focus:border-blue-400 font-bold text-center"
                                            />
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-bold text-gray-400 uppercase block mb-1">เดือน</label>
                                            <select value={month} onChange={(e) => setMonth(parseInt(e.target.value))} className="w-full p-2.5 bg-white border border-gray-300 rounded-xl outline-none focus:border-blue-400 font-bold text-center appearance-none">
                                                {THAI_MONTHS.map((m, i) => <option key={m} value={i}>{m}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-bold text-gray-400 uppercase block mb-1">ปี (พ.ศ.)</label>
                                            <input 
                                                type="number" value={year} 
                                                onChange={(e) => setYear(parseInt(e.target.value) || year)}
                                                className="w-full p-2.5 bg-white border border-gray-300 rounded-xl outline-none focus:border-blue-400 font-bold text-center"
                                            />
                                        </div>
                                    </div>
                                </div>

                                <button onClick={() => setShowSettings(!showSettings)} type="button" className="w-full flex items-center justify-center gap-2 py-2 text-sm font-bold text-gray-400 hover:text-blue-600 transition">
                                    <Icon name={showSettings ? "chevron-up" : "settings"} size={16} />
                                    {showSettings ? "ซ่อนการตั้งค่าเพิ่มเติม" : "ตั้งค่าเพิ่มเติม (ตำแหน่ง/ขนาด)"}
                                </button>

                                {showSettings && (
                                    <div className="bg-gray-50 p-5 rounded-2xl border border-gray-200 animate-fade-in">
                                        <h3 className="text-sm font-bold text-gray-700 mb-4 flex items-center gap-2">
                                            <Icon name="move-vertical" size={18} className="text-blue-500" />
                                            ปรับแต่งตำแหน่งและขนาด
                                        </h3>
                                        <div className="space-y-4">
                                            <div>
                                                <div className="flex justify-between items-end mb-1">
                                                    <label className="text-xs font-bold text-gray-500">ตำแหน่งแนวตั้ง (Y)</label>
                                                    <span className="text-[10px] font-bold text-blue-600 bg-blue-100 px-2 py-0.5 rounded">{rectY}</span>
                                                </div>
                                                <input type="range" min="0" max={image ? image.height : 2000} value={rectY} onChange={(e) => setRectY(parseInt(e.target.value))} className="w-full h-1.5 bg-gray-300 rounded-lg appearance-none cursor-pointer accent-blue-500" />
                                            </div>
                                            <div>
                                                <div className="flex justify-between items-end mb-1">
                                                    <label className="text-xs font-bold text-gray-500">ความหนาแถบดำ</label>
                                                    <span className="text-[10px] font-bold text-blue-600 bg-blue-100 px-2 py-0.5 rounded">{rectHeight}</span>
                                                </div>
                                                <input type="range" min="10" max="200" value={rectHeight} onChange={(e) => setRectHeight(parseInt(e.target.value))} className="w-full h-1.5 bg-gray-300 rounded-lg appearance-none cursor-pointer accent-blue-500" />
                                            </div>
                                            <div>
                                                <div className="flex justify-between items-end mb-1">
                                                    <label className="text-xs font-bold text-gray-500">ขนาดตัวอักษร</label>
                                                    <span className="text-[10px] font-bold text-blue-600 bg-blue-100 px-2 py-0.5 rounded">{fontSize}</span>
                                                </div>
                                                <input type="range" min="10" max="150" value={fontSize} onChange={(e) => setFontSize(parseInt(e.target.value))} className="w-full h-1.5 bg-gray-300 rounded-lg appearance-none cursor-pointer accent-blue-500" />
                                            </div>
                                        </div>
                                    </div>
                                )}

                                <button onClick={handleConfirm} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-200 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                                    {action === 'copy' ? <><Icon name="copy" size={20} /> ยืนยันการคัดลอกรูปลงเครื่อง</> : <><Icon name="download" size={20} /> ยืนยันการดาวน์โหลดรูปภาพ</>}
                                </button>
                            </div>

                            <div className="lg:col-span-7 flex flex-col">
                                <div className="bg-gray-100 rounded-2xl overflow-hidden border border-gray-200 flex-grow flex items-center justify-center relative min-h-[200px] py-4">
                                    {!image && <div className="text-gray-400 font-bold animate-pulse flex items-center gap-2"><Icon name="loader" size={18} /> กำลังโหลดรูปภาพต้นฉบับ...</div>}
                                    <canvas ref={canvasRef} className="max-w-full h-auto max-h-[35vh] md:max-h-[45vh] shadow-md" style={{ display: image ? 'block' : 'none' }} />
                                </div>
                                <p className="text-center text-xs text-gray-400 mt-3 font-medium">รูปตัวอย่างสำหรับการแก้ไข (ระบบจะบันทึกรูปจริงด้วยความละเอียด 100%)</p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- News Card Component ---
        const NewsCard = ({ item, onEdit, db, appId }) => {
            const [copiedText, setCopiedText] = useState(false);
            const [copiedImg, setCopiedImg] = useState(false);
            const [isExpanded, setIsExpanded] = useState(false);
            const [showMenu, setShowMenu] = useState(false);
            const [confirmDel, setConfirmDel] = useState(false);
            
            // สถานะเพิ่มเติมสำหรับการตรวจสอบว่าจะแก้รูปหรือไม่
            const [imageActionPrompt, setImageActionPrompt] = useState(null);
            const [showEditor, setShowEditor] = useState(null);
            
            const used = item.textCopied && (item.imageBase64 ? item.imageCopied : true);

            const handleCopyText = () => {
                try {
                    const textArea = document.createElement("textarea");
                    textArea.value = item.content;
                    textArea.style.position = "fixed";
                    textArea.style.left = "-9999px";
                    document.body.appendChild(textArea);
                    textArea.focus();
                    textArea.select();
                    
                    const successful = document.execCommand('copy');
                    document.body.removeChild(textArea);
                    
                    if(successful) {
                        setCopiedText(true); 
                        setTimeout(() => setCopiedText(false), 2000);
                        updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'news', item.id), { textCopied: true });
                    } else {
                        alert('ไม่สามารถคัดลอกข้อความได้อัตโนมัติ กรุณาคลุมดำข้อความและคัดลอกด้วยตนเอง');
                    }
                } catch (err) {
                    alert('เบราว์เซอร์ของคุณติดสิทธิ์การคัดลอกข้อความ กรุณาคลุมดำเพื่อคัดลอกด้วยตนเอง');
                }
            };

            const executeDownload = () => {
                const a = document.createElement('a'); a.href = item.imageBase64; a.download = `news-${item.id}.jpg`; a.click();
                setCopiedImg(true); setTimeout(() => setCopiedImg(false), 2000);
                updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'news', item.id), { imageCopied: true });
            };
            
            const executeCopyImageFallback = async () => {
                try {
                    const response = await fetch(item.imageBase64);
                    const blob = await response.blob();
                    
                    let clipboardItemData = blob;
                    if (blob.type !== 'image/png') {
                        const bitmap = await createImageBitmap(blob);
                        const canvas = document.createElement('canvas');
                        canvas.width = bitmap.width; canvas.height = bitmap.height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(bitmap, 0, 0);
                        clipboardItemData = await new Promise(res => canvas.toBlob(res, 'image/png'));
                    }

                    await navigator.clipboard.write([new ClipboardItem({ 'image/png': clipboardItemData })]);
                    setCopiedImg(true); setTimeout(() => setCopiedImg(false), 2000);
                    updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'news', item.id), { imageCopied: true });
                } catch (err) {
                    alert('เบราว์เซอร์ไม่รองรับการคัดลอกรูปภาพโดยตรง กรุณาใช้ปุ่ม "ดาวน์โหลด" แทนครับ');
                }
            };

            // ฟังก์ชันที่ผูกกับปุ่มหลัก เพื่อเรียกระบบถาม
            const executeImageAction = async (wantsToEdit) => {
                const action = imageActionPrompt;
                setImageActionPrompt(null);
                
                if (wantsToEdit) {
                    setShowEditor(action);
                } else {
                    if (action === 'copy') await executeCopyImageFallback();
                    if (action === 'download') executeDownload();
                }
            };

            const handleEditorComplete = () => {
                setShowEditor(null);
                setCopiedImg(true); setTimeout(() => setCopiedImg(false), 2000);
                updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'news', item.id), { imageCopied: true });
            };

            const handleDelete = async () => {
                try {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'news', item.id));
                } catch (err) {
                    console.error("เกิดข้อผิดพลาดในการลบ", err);
                }
            };

            const renderLinks = (text) => {
                const regex = /(https?:\/\/[^\s]+)/g;
                if (!text) return "";
                return text.split(regex).map((part, i) => part.match(regex) ? 
                    <a key={i} href={part} target="_blank" rel="noopener noreferrer" className="text-blue-600 hover:text-blue-800 underline break-all">{part}</a> 
                : part);
            };

            const renderContentWithHeadline = (text) => {
                if (!text) return "";
                // แยกข้อความเป็นบรรทัดๆ
                const lines = text.split(/\r?\n/);
                // หาบรรทัดที่มีแค่ . โดดๆ (ตัดช่องว่างหน้าหลังทิ้งแล้วเหลือแค่ .)
                const dotLineIndex = lines.findIndex(line => line.trim() === '.');
                
                if (dotLineIndex !== -1) {
                    // ส่วนที่เป็นพาดหัว (ทุกบรรทัดที่อยู่ก่อนบรรทัดที่มี .)
                    const headline = lines.slice(0, dotLineIndex).join('\n');
                    // ส่วนเนื้อหาที่เหลือ (ดึง . โดดๆ กลับมาแสดงด้วยเพื่อให้เหมือนต้นฉบับ)
                    const rest = lines.slice(dotLineIndex).join('\n');
                    return (
                        <React.Fragment>
                            <span className="font-bold text-gray-900 text-[17px] block mb-1">{renderLinks(headline)}</span>
                            <span>{renderLinks(rest)}</span>
                        </React.Fragment>
                    );
                }
                return renderLinks(text);
            };

            const maxLength = 180;
            const isLong = item.content?.length > maxLength;
            const displayContent = (!isLong || isExpanded) ? item.content : item.content.slice(0, maxLength) + '...';

            return (
                <div className={`relative flex flex-col bg-white rounded-3xl overflow-hidden transition-all duration-300 ${used ? 'bg-green-50/50 border-2 border-green-500 shadow-sm' : 'border border-gray-100 shadow-sm hover:shadow-md'}`}>
                    
                    {/* Status Badge */}
                    {used && (
                        <div className="absolute top-4 left-4 z-20 flex items-center gap-1.5 bg-green-100 text-green-700 px-3 py-1.5 rounded-full text-xs font-semibold shadow-sm border border-green-200 backdrop-blur-md">
                            <Icon name="check-circle-2" size={14} /> โพสต์แล้ว
                        </div>
                    )}

                    {/* Context Menu (Edit/Delete) */}
                    <div className="absolute top-4 right-4 z-20">
                        <button onClick={() => setShowMenu(!showMenu)} className="p-2 bg-white/90 backdrop-blur-sm rounded-full text-gray-500 hover:text-gray-800 shadow-sm border border-gray-100 transition-colors">
                            <Icon name="more-horizontal" size={18} />
                        </button>
                        
                        {showMenu && (
                            <div className="absolute right-0 mt-2 w-36 bg-white rounded-xl shadow-lg border border-gray-100 overflow-hidden py-1 z-30 fade-in">
                                <button onClick={() => onEdit(item)} className="w-full text-left px-4 py-2.5 text-sm text-gray-600 hover:bg-gray-50 flex items-center gap-2">
                                    <Icon name="edit-3" size={16} /> แก้ไข
                                </button>
                                {used && (
                                    <button onClick={() => { updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'news', item.id), { textCopied: false, imageCopied: false }); setShowMenu(false); }} className="w-full text-left px-4 py-2.5 text-sm text-orange-600 hover:bg-orange-50 flex items-center gap-2 border-t border-gray-50">
                                        <Icon name="rotate-ccw" size={16} /> เลิกใช้งาน
                                    </button>
                                )}
                                {confirmDel ? (
                                    <button onClick={handleDelete} className="w-full text-left px-4 py-2.5 text-sm text-white bg-red-600 hover:bg-red-700 flex items-center gap-2 border-t border-gray-50">
                                        <Icon name="trash-2" size={16} /> ยืนยันลบ
                                    </button>
                                ) : (
                                    <button onClick={() => setConfirmDel(true)} className="w-full text-left px-4 py-2.5 text-sm text-red-600 hover:bg-red-50 flex items-center gap-2 border-t border-gray-50">
                                        <Icon name="trash-2" size={16} /> ลบข่าว
                                    </button>
                                )}
                            </div>
                        )}
                        {/* Click away overlay */}
                        {showMenu && <div className="fixed inset-0 z-20" onClick={() => { setShowMenu(false); setConfirmDel(false); }}></div>}
                    </div>

                    {/* Image Section */}
                    {item.imageBase64 && (
                        <div className={`relative aspect-[4/3] bg-gray-100 ${used ? 'opacity-85' : ''}`}>
                            <img src={item.imageBase64} className="w-full h-full object-contain" alt="news" />
                            
                            {/* Prominent Action Buttons (ปรับปรุงให้ใหญ่และกดง่ายขึ้น) */}
                            {!imageActionPrompt && (
                                <div className="absolute bottom-4 inset-x-4 flex justify-center gap-3">
                                    <button onClick={() => setImageActionPrompt('copy')} className="flex-1 bg-white/95 backdrop-blur-md py-3 rounded-2xl shadow-lg text-gray-800 hover:text-blue-600 font-bold text-sm flex items-center justify-center gap-2 border border-white/50 transition-all hover:scale-105 active:scale-95">
                                        {copiedImg ? <Icon name="check" size={18} className="text-green-500" /> : <Icon name="copy" size={18} />}
                                        {copiedImg ? 'คัดลอกแล้ว' : 'คัดลอกรูป'}
                                    </button>
                                    <button onClick={() => setImageActionPrompt('download')} className="flex-1 bg-white/95 backdrop-blur-md py-3 rounded-2xl shadow-lg text-gray-800 hover:text-blue-600 font-bold text-sm flex items-center justify-center gap-2 border border-white/50 transition-all hover:scale-105 active:scale-95">
                                        <Icon name="download" size={18} /> โหลดรูป
                                    </button>
                                </div>
                            )}

                            {/* Prompt Overlay (เมื่อกดปุ่มคัดลอก/ดาวน์โหลด) */}
                            {imageActionPrompt && (
                                <div className="absolute inset-0 z-10 bg-black/60 backdrop-blur-sm flex flex-col items-center justify-center p-4 text-center animate-fade-in">
                                    <div className="bg-white rounded-2xl p-5 shadow-2xl w-full max-w-[280px] border border-white/20">
                                        <div className="w-10 h-10 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-3">
                                            <Icon name="calendar-edit" size={20} />
                                        </div>
                                        <h3 className="text-base font-bold text-gray-800 mb-1">ต้องการแก้ไขวันที่หรือไม่?</h3>
                                        <p className="text-xs text-gray-500 mb-4">ระบบจะใส่แถบวันที่ปัจจุบันลงบนรูปภาพ</p>
                                        <div className="flex flex-col gap-2">
                                            <button onClick={() => executeImageAction(true)} className="w-full py-2.5 bg-blue-600 text-white rounded-xl font-bold text-sm shadow-md hover:bg-blue-700 active:scale-[0.98] transition">ต้องการ</button>
                                            <button onClick={() => executeImageAction(false)} className="w-full py-2.5 bg-gray-100 text-gray-700 rounded-xl font-bold text-sm hover:bg-gray-200 active:scale-[0.98] transition">ไม่ต้องการ</button>
                                            <button onClick={() => setImageActionPrompt(null)} className="w-full py-1.5 text-gray-400 hover:text-gray-600 font-medium text-xs mt-1 transition">ยกเลิกรายการ</button>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}

                    {/* Content Section */}
                    <div className="p-5 flex-grow flex flex-col">
                        <div className="flex items-center text-xs text-gray-400 mb-3 font-medium">
                            <Icon name="clock" size={14} className="mr-1.5" />
                            เวลา {item.timeString} น.
                        </div>
                        
                        <div className={`text-gray-700 whitespace-pre-wrap text-[15px] leading-relaxed mb-4 flex-grow ${used ? 'opacity-80' : ''}`}>
                            {renderContentWithHeadline(displayContent)}
                            {isLong && (
                                <button onClick={() => setIsExpanded(!isExpanded)} className="text-blue-600 hover:text-blue-800 font-medium ml-2 text-sm">
                                    {isExpanded ? 'ย่อเนื้อหา' : 'อ่านเพิ่มเติม...'}
                                </button>
                            )}
                        </div>

                        {/* Text Copy Button */}
                        <div className="mt-auto pt-4 border-t border-gray-100">
                            <button onClick={handleCopyText} className={`w-full py-3.5 rounded-xl font-medium text-sm transition-all flex items-center justify-center gap-2 ${copiedText ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-700 hover:bg-blue-50 hover:text-blue-700 active:scale-95'}`}>
                                {copiedText ? <Icon name="check" size={18} /> : <Icon name="copy" size={18} />}
                                {copiedText ? 'คัดลอกสำเร็จ' : 'คัดลอกข้อความข่าว'}
                            </button>
                        </div>
                    </div>
                    
                    {/* Render Date Editor Modal via Portal เพื่อแก้ปัญหา fixed ไม่เต็มจอ */}
                    {showEditor && ReactDOM.createPortal(
                        <DateEditorModal 
                            imageUrl={item.imageBase64} 
                            action={showEditor} 
                            onClose={() => setShowEditor(null)} 
                            onComplete={handleEditorComplete} 
                        />,
                        document.body
                    )}
                </div>
            );
        };

        // --- Admin Form Component ---
        const AdminPanel = ({ onCancel, editingItem, db, appId }) => {
            const [content, setContent] = useState(editingItem?.content || '');
            const [imgPre, setImgPre] = useState(editingItem?.imageBase64 || null);
            const [saving, setSaving] = useState(false);
            
            const [d, setD] = useState(editingItem ? new Date(editingItem.timestamp).getDate() : new Date().getDate());
            const [m, setM] = useState(editingItem ? new Date(editingItem.timestamp).getMonth() : new Date().getMonth());
            const [y, setY] = useState(editingItem ? new Date(editingItem.timestamp).getFullYear()+543 : new Date().getFullYear()+543);

            const handleSave = async (e) => {
                e.preventDefault(); setSaving(true);
                const chosenDate = new Date(y-543, m, d);
                const now = new Date();
                chosenDate.setHours(now.getHours(), now.getMinutes());

                const payload = {
                    content: content || "", 
                    timestamp: chosenDate.getTime(),
                    dateString: chosenDate.toLocaleDateString('th-TH', { year:'numeric', month:'long', day:'numeric' }),
                    timeString: chosenDate.toLocaleTimeString('th-TH', { hour:'2-digit', minute:'2-digit' }),
                    imageBase64: imgPre || null, 
                    textCopied: editingItem?.textCopied ?? false, 
                    imageCopied: editingItem?.imageCopied ?? false,
                    copied: editingItem?.copied ?? false
                };

                try {
                    if (editingItem) await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'news', editingItem.id), payload);
                    else await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'news', crypto.randomUUID()), payload);
                    onCancel();
                } catch (err) { alert("เกิดข้อผิดพลาดในการบันทึก"); setSaving(false); }
            };

            return (
                <div className="max-w-2xl mx-auto fade-in">
                    <form onSubmit={handleSave} className="bg-white p-6 md:p-10 rounded-[2rem] shadow-sm border border-gray-100 space-y-8">
                        
                        <div className="flex items-center gap-4 pb-4 border-b border-gray-100">
                            <div className="bg-blue-50 p-3 rounded-2xl text-blue-600">
                                <Icon name={editingItem ? 'edit-3' : 'file-plus-2'} size={28} />
                            </div>
                            <div>
                                <h2 className="text-2xl font-bold text-gray-800 tracking-tight">{editingItem ? 'แก้ไขข่าวสาร' : 'ลงข่าวใหม่'}</h2>
                                <p className="text-gray-500 text-sm mt-0.5">ระบบจะบันทึกและแสดงผลเรียงตามวันที่</p>
                            </div>
                        </div>
                        
                        {/* Date Picker */}
                        <div className="space-y-3">
                            <label className="block text-sm font-semibold text-gray-700">วันที่ลงข่าว (วัน/เดือน/ปี พ.ศ.)</label>
                            <div className="grid grid-cols-3 gap-3">
                                <select value={d} onChange={e => setD(parseInt(e.target.value))} className="bg-white p-3.5 rounded-xl text-sm border border-gray-200 outline-none focus:ring-2 focus:ring-blue-100 focus:border-blue-400 transition-all text-gray-700 shadow-sm cursor-pointer">{Array.from({length:31}, (_,i) => <option key={i+1} value={i+1}>{i+1}</option>)}</select>
                                <select value={m} onChange={e => setM(parseInt(e.target.value))} className="bg-white p-3.5 rounded-xl text-sm border border-gray-200 outline-none focus:ring-2 focus:ring-blue-100 focus:border-blue-400 transition-all text-gray-700 shadow-sm cursor-pointer">{THAI_MONTHS.map((name, i) => <option key={i} value={i}>{name}</option>)}</select>
                                <select value={y} onChange={e => setY(parseInt(e.target.value))} className="bg-white p-3.5 rounded-xl text-sm border border-gray-200 outline-none focus:ring-2 focus:ring-blue-100 focus:border-blue-400 transition-all text-gray-700 shadow-sm cursor-pointer">{[y-1, y, y+1].map(v => <option key={v} value={v}>{v}</option>)}</select>
                            </div>
                        </div>

                        {/* Image Upload */}
                        <div className="space-y-3">
                            <label className="block text-sm font-semibold text-gray-700">รูปภาพประกอบ (ถ้ามี)</label>
                            <div className={`mt-1 flex flex-col items-center justify-center px-6 py-10 border-2 border-dashed rounded-[1.5rem] transition-all cursor-pointer relative ${imgPre ? 'border-blue-200 bg-blue-50/30' : 'border-gray-200 bg-gray-50 hover:bg-gray-100 hover:border-blue-300'}`} onClick={() => document.getElementById('file-upload').click()}>
                                <input type="file" id="file-upload" hidden accept="image/*" onChange={async e => { if(e.target.files[0]) setImgPre(await processImage(e.target.files[0])); }} />
                                
                                {imgPre ? (
                                    <div className="space-y-4 w-full">
                                        <img src={imgPre} className="max-h-64 mx-auto rounded-xl shadow-sm object-contain" alt="Preview" />
                                        <p className="text-sm text-blue-600 font-medium flex items-center justify-center gap-1.5"><Icon name="refresh-cw" size={16} /> เปลี่ยนรูปภาพใหม่</p>
                                    </div>
                                ) : (
                                    <div className="text-gray-400 text-center space-y-3">
                                        <div className="bg-white w-14 h-14 rounded-full flex items-center justify-center mx-auto shadow-sm border border-gray-100"><Icon name="image-plus" size={28} className="text-gray-400" /></div>
                                        <div className="font-medium text-gray-600">คลิกเพื่อเลือกรูปภาพ</div>
                                        <p className="text-xs text-gray-400">ระบบจะบีบอัดรูปให้เหมาะสมอัตโนมัติ</p>
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* Content Textarea */}
                        <div className="space-y-3">
                            <label className="block text-sm font-semibold text-gray-700">รายละเอียดข่าว</label>
                            <textarea rows="6" className="w-full bg-white border border-gray-200 p-5 rounded-2xl text-sm leading-relaxed outline-none focus:ring-2 focus:ring-blue-100 focus:border-blue-400 transition-all text-gray-700 shadow-sm resize-none" placeholder="พิมพ์เนื้อหาข่าว หรือวางลิงก์ที่นี่..." value={content} onChange={e => setContent(e.target.value)} required />
                        </div>

                        {/* Actions */}
                        <div className="flex flex-col sm:flex-row gap-3 pt-6 border-t border-gray-100">
                            <button type="button" onClick={onCancel} className="w-full sm:w-1/3 py-3.5 rounded-xl font-medium text-gray-600 bg-gray-100 hover:bg-gray-200 transition-colors text-sm">ยกเลิก</button>
                            <button type="submit" disabled={saving} className="w-full sm:w-2/3 py-3.5 rounded-xl font-medium text-white bg-blue-600 hover:bg-blue-700 shadow-md shadow-blue-200 active:scale-[0.98] transition-all text-sm flex items-center justify-center gap-2">
                                {saving ? <span className="animate-pulse">กำลังบันทึก...</span> : <><Icon name="save" size={18} /> {editingItem ? 'อัปเดตข้อมูล' : 'บันทึกและเผยแพร่'}</>}
                            </button>
                        </div>
                    </form>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
