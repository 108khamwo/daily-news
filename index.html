const canvasToBlob = (canvas, type = 'image/png', quality = 0.95) => {
    return new Promise((resolve, reject) => {
        canvas.toBlob((blob) => {
            if (blob)
                resolve(blob);
            else
                reject(new Error('ไม่สามารถสร้างไฟล์รูปภาพได้'));
        }, type, quality);
    });
};

    return response.blob();

const saveImageToDevice = async ({ canvas = null, dataUrl = '', filename = 'news-image.png', mimeType = 'image/png' }) => {
    try {
        let blob;
        if (canvas) {
            // บังคับใช้ PNG เพื่อรักษาความคมของกรอบและตัวหนังสือ
            const exactDataUrl = canvas.toDataURL('image/png');
            blob = await dataUrlToBlob(exactDataUrl);
        }
        else {
            blob = await dataUrlToBlob(dataUrl);
        }
        const actualType = blob.type || mimeType || 'image/png';
        const safeFilename = /\.[a-z0-9]+$/i.test(filename)
            ? filename.replace(/\.[a-z0-9]+$/i, '.png')
            : `${filename}.png`;
        const file = new File([blob], safeFilename, { type: actualType });
        if (isIOSMobile()) {
            const canShareFile = typeof navigator.share === 'function' &&
                (typeof navigator.canShare !== 'function' || navigator.canShare({ files: [file] }));
            if (canShareFile) {
                try {
                    await navigator.share({
                        files: [file],
                        title: 'บันทึกรูปภาพ'
                    });
                    return true;
                }
                catch (error) {
                    // ผู้ใช้ปิดเมนูแชร์เอง ไม่ต้องแสดงข้อความผิดพลาด

                        return false;

            // วิธีสำรอง: เปิด PNG ต้นฉบับเพื่อแตะค้างบันทึก
            return await openExactImageOnIOS({ blob, filename: safeFilename });
        }
        // คอมพิวเตอร์และ Android ใช้วิธีดาวน์โหลดเดิม
        const objectUrl = URL.createObjectURL(blob);
        const link = document.createElement('a');

// รวมคำสั่งสร้างไอคอนหลายตัวให้ทำงานเพียงครั้งเดียวต่อเฟรม

let lucideRefreshQueued = false;
const scheduleLucideRefresh = () => {
    if (lucideRefreshQueued || !window.lucide)
        return;
    lucideRefreshQueued = true;
    const run = () => {
        lucideRefreshQueued = false;
        try {
            window.lucide.createIcons();

        catch (error) {
            console.warn('สร้างไอคอนไม่สำเร็จ', error);
        }
    };
    if (typeof window.requestAnimationFrame === 'function')
        window.requestAnimationFrame(run);
    else
        setTimeout(run, 0);
};
const Icon = ({ name, size = 20, className = "" }) => {
    const iconRef = useRef(null);
    useEffect(() => {
        if (window.lucide && iconRef.current) {
            iconRef.current.innerHTML = `<i data-lucide="${name}" style="width: ${size}px; height: ${size}px;" class="${className}"></i>`;
            scheduleLucideRefresh();
        }
    }, [name, size, className]);
    return React.createElement("span", { ref: iconRef, className: `inline-flex items-center justify-center ${className}` });
};
// ดึงรายการข่าวของทั้งสัปดาห์ขึ้นมาครบเหมือนเดิม
// แต่เลื่อนการถอดรหัสรูป Base64 จนกว่าการ์ดจะใกล้หน้าจอ เพื่อลดภาระ Safari
// ข้อมูลและโครงสร้างใน Firestore ยังคงเดิมทุกประการ
const LazyNewsImage = ({ src }) => {
    const containerRef = useRef(null);
    const [shouldLoad, setShouldLoad] = useState(false);
    const [loaded, setLoaded] = useState(false);
    useEffect(() => {
        setLoaded(false);
        if (!src)
            return;
        if (typeof window === 'undefined' || !('IntersectionObserver' in window)) {
            setShouldLoad(true);
            return;
        }
        const observer = new IntersectionObserver((entries) => {
            if (entries.some(entry => entry.isIntersecting)) {
                setShouldLoad(true);
                observer.disconnect();
            }
        }, { rootMargin: '500px 0px' });
        if (containerRef.current)
            observer.observe(containerRef.current);
        return () => observer.disconnect();
    }, [src]);
    return (React.createElement("div", { ref: containerRef, className: "absolute inset-0 flex items-center justify-center" },
        !loaded && React.createElement("div", { className: "absolute inset-0 bg-gray-100 animate-pulse", "aria-hidden": "true" }),
        shouldLoad && (React.createElement("img", { src: src, className: `w-full h-full object-contain transition-opacity duration-200 ${loaded ? 'opacity-100' : 'opacity-0'}`, alt: "news", loading: "lazy", decoding: "async", fetchPriority: "low", onLoad: () => setLoaded(true), onError: () => setLoaded(true) }))));
};
// --- Helper Functions ---
const processImage = (file, maxSizeKB = 700) => {
    return new Promise((resolve) => {
        if (file.size <= maxSizeKB * 1024) {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
        }
        else {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                let width = img.width;
                let height = img.height;
                const targetWidth = 1600;
                if (width > targetWidth) {
                    height = Math.round(height * (targetWidth / width));
                    width = targetWidth;
                }
                canvas.width = width;
                canvas.height = height;
                ctx.imageSmoothingEnabled = true;
                ctx.imageSmoothingQuality = 'high';
                ctx.drawImage(img, 0, 0, width, height);
                resolve(canvas.toDataURL('image/jpeg', 0.95));
            };
            img.src = URL.createObjectURL(file);
        }
    });
};
const getWeekStartDate = (timestamp = Date.now()) => {
    const d = new Date(timestamp);
    const day = d.getDay() === 0 ? 7 : d.getDay();
    const start = new Date(d);
    start.setDate(d.getDate() - day + 1);
    start.setHours(0, 0, 0, 0);
    return start;
};
const getWeekInfo = (timestamp) => {
    const start = getWeekStartDate(timestamp);
    const end = new Date(start);
    end.setDate(start.getDate() + 6);
    return {
        key: start.getTime(),
        label: `${start.toLocaleDateString('th-TH', { day: 'numeric', month: 'short' })} - ${end.toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: 'numeric' })}`
    };
};
const MAX_PREVIOUS_WEEKS = 8;
// --- ค้นหาข่าวทั้งหมดที่มี โดยไม่โหลดรูป Base64 ทุกใบพร้อมกัน ---
// ใช้ Firestore REST field mask เพื่ออ่านเฉพาะข้อความ/วันที่ก่อน จากนั้นจึงโหลดเอกสารเต็มเฉพาะข่าวที่ค้นเจอ
let globalSearchIndexCache = null;
let globalSearchIndexCachedAt = 0;
let globalSearchIndexPromise = null;
const globalSearchFullDocCache = new Map();
const GLOBAL_SEARCH_CACHE_MS = 60 * 1000;
const invalidateGlobalSearchCache = () => {
    globalSearchIndexCache = null;
    globalSearchIndexCachedAt = 0;
    globalSearchIndexPromise = null;
    globalSearchFullDocCache.clear();
};
const firestoreValueToJs = (value) => {
    if (!value || typeof value !== 'object')
        return null;
    if ('stringValue' in value)
        return value.stringValue;
    if ('integerValue' in value)
        return Number(value.integerValue);
    if ('doubleValue' in value)
        return Number(value.doubleValue);
    if ('booleanValue' in value)
        return Boolean(value.booleanValue);
    if ('timestampValue' in value)
        return new Date(value.timestampValue).getTime();
    if ('nullValue' in value)
        return null;
    return null;
};
const parseProjectedNewsDocument = (documentData) => {
    const name = documentData?.name || '';
    const id = name.split('/').pop();
    const fields = documentData?.fields || {};
    return {
        id,
        content: firestoreValueToJs(fields.content) || '',
        timestamp: firestoreValueToJs(fields.timestamp) || 0,
        dateString: firestoreValueToJs(fields.dateString) || '',
        timeString: firestoreValueToJs(fields.timeString) || '',
        textCopied: Boolean(firestoreValueToJs(fields.textCopied)),
        imageCopied: Boolean(firestoreValueToJs(fields.imageCopied)),
        copied: Boolean(firestoreValueToJs(fields.copied))
    };
};
const fetchGlobalSearchIndexWithRest = async () => {
    const currentUser = auth.currentUser;
    if (!currentUser)
        throw new Error('ยังไม่ได้เชื่อมต่อ Firebase Authentication');
    const token = await currentUser.getIdToken();
    const parentPath = `artifacts/${encodeURIComponent(appId)}/public/data`;
    const endpoint = `https://firestore.googleapis.com/v1/projects/${firebaseConfig.projectId}/databases/(default)/documents/${parentPath}:runQuery?key=${encodeURIComponent(firebaseConfig.apiKey)}`;
    const response = await fetch(endpoint, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({
            structuredQuery: {
                select: {
                    fields: [
                        { fieldPath: 'content' },
                        { fieldPath: 'timestamp' },
                        { fieldPath: 'dateString' },
                        { fieldPath: 'timeString' },
                        { fieldPath: 'textCopied' },
                        { fieldPath: 'imageCopied' },
                        { fieldPath: 'copied' }
                    ]
                },
                from: [{ collectionId: 'news' }],
                orderBy: [{ field: { fieldPath: 'timestamp' }, direction: 'DESCENDING' }]
            }
        })
    });
    if (!response.ok) {
        const detail = await response.text().catch(() => '');
        throw new Error(`Firestore REST ${response.status}: ${detail.slice(0, 200)}`);
    }
    const rows = await response.json();
    return rows
        .filter(row => row.document)
        .map(row => parseProjectedNewsDocument(row.document))
        .filter(item => item.id);
};
const fetchGlobalSearchIndexFallback = async () => {
    // ใช้เฉพาะกรณีเบราว์เซอร์/กฎ Firestore ไม่อนุญาต REST field mask
    const snapshot = await getDocs(query(collection(db, 'artifacts', appId, 'public', 'data', 'news'), orderBy('timestamp', 'desc')));
    const rows = [];
    snapshot.forEach(itemDoc => {
        const data = itemDoc.data();
        rows.push({
            id: itemDoc.id,
            content: data.content || '',
            timestamp: data.timestamp || 0,
            dateString: data.dateString || '',
            timeString: data.timeString || '',
            textCopied: Boolean(data.textCopied),
            imageCopied: Boolean(data.imageCopied),
            copied: Boolean(data.copied)
        });
    });
    return rows;
};
const loadGlobalSearchIndex = async () => {
    const now = Date.now();
    if (globalSearchIndexCache && (now - globalSearchIndexCachedAt) < GLOBAL_SEARCH_CACHE_MS) {
        return globalSearchIndexCache;
    }
    if (globalSearchIndexPromise)
        return globalSearchIndexPromise;
    globalSearchIndexPromise = (async () => {
        let index;
        try {
            index = await fetchGlobalSearchIndexWithRest();
        }
        catch (restError) {
            console.warn('ค้นหาแบบประหยัดข้อมูลไม่สำเร็จ กำลังใช้วิธีสำรอง', restError);
            index = await fetchGlobalSearchIndexFallback();
        }
        globalSearchIndexCache = index;
        globalSearchIndexCachedAt = Date.now();
        return index;
    })();
    try {
        return await globalSearchIndexPromise;
    }
    finally {
        globalSearchIndexPromise = null;
    }
};
const loadFullNewsDocuments = async (items) => {
    const output = new Array(items.length);
    let cursor = 0;
    const workerCount = Math.min(6, Math.max(1, items.length));
    const worker = async () => {
        while (true) {
            const index = cursor++;
            if (index >= items.length)
                return;
            const item = items[index];
            if (globalSearchFullDocCache.has(item.id)) {
                output[index] = globalSearchFullDocCache.get(item.id);
                continue;
            }
            try {
                const snapshot = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'news', item.id));
                if (snapshot.exists()) {
                    const fullItem = { id: snapshot.id, ...snapshot.data() };
                    globalSearchFullDocCache.set(item.id, fullItem);
                    output[index] = fullItem;
                }
            }
            catch (error) {
                console.error('โหลดข่าวจากผลค้นหาไม่สำเร็จ', item.id, error);
            }
        }
    };
    await Promise.all(Array.from({ length: workerCount }, () => worker()));
    return output.filter(Boolean);
};
const searchAllExistingNews = async (rawQuery) => {
    const keyword = String(rawQuery || '').trim().toLocaleLowerCase('th-TH');
    if (!keyword)
        return [];
    const index = await loadGlobalSearchIndex();
    const matched = index.filter(item => {
        const searchable = `${item.content || ''}\n${item.dateString || ''}\n${item.timeString || ''}`.toLocaleLowerCase('th-TH');
        return searchable.includes(keyword);
    });
    return loadFullNewsDocuments(matched);
};

const App = () => {
    const [user, setUser] = useState(null);
    const [news, setNews] = useState([]);
    const [view, setView] = useState('dashboard');
    const [loading, setLoading] = useState(true);
    const [dataLoading, setDataLoading] = useState(true);
    const [olderNewsLoading, setOlderNewsLoading] = useState(false);
    const [loadedPreviousWeeks, setLoadedPreviousWeeks] = useState(0);
    const [editingItem, setEditingItem] = useState(null);
    const [showUpdateAlert, setShowUpdateAlert] = useState(true);
    useEffect(() => {
        signInAnonymously(auth).catch(() => setUser({ uid: 'guest' }));
        const unsub = onAuthStateChanged(auth, (u) => {
            if (u)
                setUser(u);
            setLoading(false);
        });
        return () => unsub();
    }, []);
    useEffect(() => {
        if (!user)
            return;
        const currentWeekStart = getWeekStartDate();
        const currentWeekEnd = new Date(currentWeekStart);
        currentWeekEnd.setDate(currentWeekStart.getDate() + 7);
        const queryStart = new Date(currentWeekStart);
        queryStart.setDate(currentWeekStart.getDate() - (loadedPreviousWeeks * 7));
        if (news.length === 0)
            setDataLoading(true);
        else if (loadedPreviousWeeks > 0)
            setOlderNewsLoading(true);
        const newsQuery = query(collection(db, 'artifacts', appId, 'public', 'data', 'news'), where('timestamp', '>=', queryStart.getTime()), where('timestamp', '<', currentWeekEnd.getTime()), orderBy('timestamp', 'desc'));
        const unsub = onSnapshot(newsQuery, (snap) => {
            const data = [];
            snap.forEach(doc => data.push({ id: doc.id, ...doc.data() }));
            setNews(data);
            setDataLoading(false);
            setOlderNewsLoading(false);
            const limit = Date.now() - (60 * 24 * 60 * 60 * 1000);
            data.forEach(item => { if (item.timestamp < limit)
                deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'news', item.id)); });
        }, (err) => {
            console.error('โหลดข่าวไม่สำเร็จ', err);
            setDataLoading(false);
            setOlderNewsLoading(false);
        });
        return () => unsub();
    }, [user, loadedPreviousWeeks]);
    const loadMoreWeeks = () => {
        setOlderNewsLoading(true);
        setLoadedPreviousWeeks(prev => Math.min(prev + 1, MAX_PREVIOUS_WEEKS));
    };
    if (loading || dataLoading)
