<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="https://www.gstatic.com/mobilesdk/160503_mobilesdk/logo/2x/firebase_28dp.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>รวมข่าวประจำวัน - Daily News App</title>
    
    <!-- โหลด Tailwind CSS ผ่าน CDN เพื่อให้มั่นใจว่าการแสดงผลสวยงามทันที -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- เพิ่มฟอนต์ภาษาไทยเพื่อความทันสมัย -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@100..900&display=swap" rel="stylesheet">
    
    <style>
      body {
        font-family: 'Noto Sans Thai', sans-serif;
        background-color: #f9fafb;
        margin: 0;
        padding: 0;
      }
    </style>
  </head>
  <body>
    <!-- จุดที่ React จะนำแอปไปแสดงผล -->
    <div id="root"></div>

    <!-- 
      การเชื่อมต่อไฟล์หลัก: 
      ตรวจสอบให้แน่ใจว่าไฟล์ App.jsx ของคุณอยู่ในโฟลเดอร์ src 
      และมีโค้ดส่วน createRoot(document.getElementById('root')) อยู่ด้านล่างสุดของไฟล์นั้น
    -->
    <script type="module" src="/src/App.jsx"></script>
  </body>
</html>
